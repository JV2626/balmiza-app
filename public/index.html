<!DOCTYPE html>
<html lang="%LANG_ISO_CODE%">
  <head>
    <meta charset="utf-8" />
    <meta httpEquiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>%WEB_TITLE%</title>
    
    <!-- Configurações PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#DF0A0A" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Balmiza" />

    <!-- The `react-native-web` recommended style reset: https://necolas.github.io/react-native-web/docs/setup/#root-element -->
    <style id="expo-reset">
      /* These styles make the body full-height */
      html,
      body {
        height: 100%;
      }
      /* These styles disable body scrolling if you are using <ScrollView> */
      body {
        overflow: hidden;
      }
      /* These styles make the root element full-height */
      #root {
        display: flex;
        height: 100%;
        flex: 1;
      }
    </style>
  </head>

  <body>
    <!-- Use static rendering with Expo Router to support running without JavaScript. -->
    <noscript>
      You need to enable JavaScript to run this app.
    </noscript>
    <!-- The root element for your Expo app. -->
    <div id="root"></div>

    <!-- Remover o Service Worker antigo e limpar caches para evitar travamento de tela branca -->
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(registrations => {
          for (let registration of registrations) {
            registration.unregister().then(() => {
              console.log('Service Worker antigo removido com sucesso.');
            });
          }
        }).catch(err => console.log('Erro ao desregistrar SW:', err));
      }
      if ('caches' in window) {
        caches.keys().then(names => {
          for (let name of names) {
            caches.delete(name).then(() => {
              console.log('Cache limpo:', name);
            });
          }
        }).catch(err => console.log('Erro ao limpar caches:', err));
      }
    </script>
  </body>
</html>
